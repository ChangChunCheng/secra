syntax = "proto3";

package secra.v1;

option go_package = "gitlab.com/jacky850509/secra/api/gen/v1;secra_v1";

import "google/protobuf/empty.proto";

// SubscriptionService 定義訂閱功能的 gRPC 介面
service SubscriptionService {
  // 建立訂閱
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  // 列出使用者所有訂閱
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);
  // 刪除訂閱
  rpc DeleteSubscription(DeleteSubscriptionRequest) returns (google.protobuf.Empty);
}

message SubscriptionTarget {
  // 目標類型: CVE來源=“cve_source”，廠商=“vendor”，產品=“product”
  string target_type = 1;
  // 目標識別 ID (UUID 格式)
  string target_id = 2;
}

message Subscription {
  string id = 1;
  string user_id = 2;
  repeated SubscriptionTarget targets = 3;
  string severity_threshold = 4;
  string created_at = 5;
}

message CreateSubscriptionRequest {
  string user_id = 1;
  repeated SubscriptionTarget targets = 2;
  string severity_threshold = 3;
}

message CreateSubscriptionResponse {
  Subscription subscription = 1;
}

message ListSubscriptionsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListSubscriptionsResponse {
  repeated Subscription subscriptions = 1;
  int32 total = 2;
}

message DeleteSubscriptionRequest {
  // 訂閱 ID (UUID 格式)
  string id = 1;
}
