syntax = "proto3";

package secra.v1;

option go_package = "gitlab.com/jacky850509/secra/api/gen/v1;secra_v1";

message LoginRequest {
  string username = 1;
  string password = 2;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string confirmPassword = 3;
  string email    = 4;
}

message TokenRequest {
  string token = 1;
}

message UpdateProfileRequest {
   string token         = 1;
   string email         = 2;
   string password      = 3;
   string confirmPassword = 4;
}

message UserProfile {
  string id       = 1;
  string username = 2;
  string email    = 3;
}

message LoginResponse {
  string token     = 1;
  string expire_at = 2;
}

message RegisterResponse {
  string message = 1;
}

service UserService {
  // 使用者註冊
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // 使用者登入
  rpc Login(LoginRequest) returns (LoginResponse);
  // 取得個人資料
  rpc GetProfile(TokenRequest) returns (UserProfile);
  // 更新個人資料
  rpc UpdateProfile(UpdateProfileRequest) returns (UserProfile);
}
