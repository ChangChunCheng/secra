{{ define "content" }}
<div class="card" style="max-width: 800px; margin: 20px auto;">
    <h2>Create New Custom CVE</h2>
    <p style="color: var(--text-secondary); margin-bottom: 20px;">Publish vulnerability intelligence to the SECRA network.</p>
    
    <form action="/cves/new" method="POST">
        <label for="source_uid">CVE Identifier (e.g., CVE-2026-0001)</label>
        <input type="text" name="source_uid" required placeholder="CVE-YYYY-XXXX">
        
        <label for="title">Title</label>
        <input type="text" name="title" required placeholder="A concise summary of the vulnerability">
        
        <label for="description">Detailed Description</label>
        <textarea name="description" rows="5" required placeholder="Describe the vulnerability, impact, and reproduction steps..."></textarea>
        
        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label for="severity">Severity</label>
                <select name="severity">
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="HIGH" selected>HIGH</option>
                    <option value="CRITICAL">CRITICAL</option>
                </select>
            </div>
            <div>
                <label for="cvss_score">CVSS Score (0.0 - 10.0)</label>
                <input type="number" name="cvss_score" step="0.1" min="0" max="10" value="7.0">
            </div>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Publish CVE</button>
    </form>
</div>
{{ end }}
