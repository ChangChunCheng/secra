{{ define "content" }}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>User Management (Admin Only)</h2>
        <span class="badge low">{{ len .Users }} Users Total</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Current Role</th>
                <th>Status</th>
                <th>Registered At</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {{ range .Users }}
            <tr>
                <td><strong>{{ .Username }}</strong></td>
                <td>{{ .Email }}</td>
                <td>
                    <span class="badge {{ if eq .Role "admin" }}high{{ else }}low{{ end }}">
                        {{ .Role }}
                    </span>
                </td>
                <td>
                    <span class="badge {{ if eq .Status "active" }}low{{ else }}high{{ end }}" style="background-color: {{ if eq .Status "active" }}var(--accent-color){{ else }}var(--danger-color){{ end }}; color: var(--bg-color);">
                        {{ .Status }}
                    </span>
                </td>
                <td><code style="font-size: 0.8rem;">{{ formatDate .CreatedAt }}</code></td>
                <td>
                    <form action="/admin/users/role" method="POST" style="display: flex; gap: 5px;">
                        <input type="hidden" name="user_id" value="{{ .ID }}">
                        <select name="role" style="height: 30px; font-size: 0.7rem; width: 80px; padding: 0 5px;">
                            <option value="user" {{ if eq .Role "user" }}selected{{ end }}>User</option>
                            <option value="admin" {{ if eq .Role "admin" }}selected{{ end }}>Admin</option>
                        </select>
                        <button type="submit" class="btn" style="height: 30px; padding: 0 10px; font-size: 0.7rem;">Update</button>
                    </form>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ end }}
