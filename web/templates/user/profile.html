{{ define "content" }}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Update Profile & Preferences</h2>
    <form action="/profile" method="POST" class="search-toolbar" style="flex-direction: column; align-items: stretch;">
        {{ if .Error }}
            <p style="color: var(--danger-color);">{{ .Error }}</p>
        {{ end }}
        
        <div class="search-field">
            <label>Username</label>
            <input type="text" value="{{ .User.Username }}" disabled style="background-color: rgba(255,255,255,0.05);">
        </div>

        <div class="search-field">
            <label for="email">Email Address</label>
            <input type="email" name="email" value="{{ .User.Email }}" required>
        </div>

        <div class="search-field">
            <label for="password">New Password (leave blank to keep current)</label>
            <input type="password" name="password">
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">

        <h3>Notification Settings</h3>
        
        <div class="search-field">
            <label for="notification_frequency">Frequency</label>
            <select name="notification_frequency">
                <option value="immediate" {{ if eq .User.NotificationFrequency "immediate" }}selected{{ end }}>Immediate (Alert on discovery)</option>
                <option value="daily" {{ if eq .User.NotificationFrequency "daily" }}selected{{ end }}>Daily Digest (8:00 AM Local)</option>
                <option value="weekly" {{ if eq .User.NotificationFrequency "weekly" }}selected{{ end }}>Weekly Digest (Monday 8:00 AM)</option>
            </select>
        </div>

        <div class="search-field">
            <label for="timezone">Your Timezone</label>
            <select name="timezone" id="timezone-select">
                <option value="UTC">UTC (Universal Time)</option>
                <option value="Asia/Taipei">Asia/Taipei (GMT+8)</option>
                <option value="Asia/Tokyo">Asia/Tokyo (GMT+9)</option>
                <option value="Asia/Shanghai">Asia/Shanghai (GMT+8)</option>
                <option value="America/New_York">America/New_York (EST/EDT)</option>
                <option value="Europe/London">Europe/London (GMT/BST)</option>
            </select>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn" style="width: 100%;">Save Changes</button>
        </div>
    </form>
</div>

<script>
    // Pre-select current timezone
    document.getElementById('timezone-select').value = "{{ .User.Timezone }}";
</script>
{{ end }}
