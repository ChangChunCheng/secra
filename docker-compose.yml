services:
  db:
    image: postgres:17-alpine
    container_name: secra-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-secra}
    ports:
      - "${DB_PORT_MAP:-5432:5432}"
    volumes:
      - secra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VERSION: "${APP_VERSION:-dev}"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        GIT_COMMIT: "${GIT_COMMIT:-none}"
        BUILT_BY: "${HOSTNAME:-unknown}"
    container_name: secra-server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "50051:50051" # gRPC
      - "8081:8080"   # REST API
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-secra}?sslmode=disable
      - GRPC_PORT=:50051
      - HTTP_PORT=:8080
    healthcheck:
      test: ["CMD", "secra", "health", "check", "--type", "http"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: secra-frontend
    ports:
      - "80:80" # Unified Entry Point
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
    depends_on:
      - server

volumes:
  secra_pgdata:
