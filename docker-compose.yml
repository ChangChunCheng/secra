services:
  db:
    image: postgres:17-alpine
    container_name: secra-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secra
    ports:
      - "5432:5432"
    volumes:
      - secra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  grpc:
    build:
      context: .
      args:
        VERSION: "${APP_VERSION:-dev}"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        GIT_COMMIT: "${GIT_COMMIT:-none}"
        BUILT_BY: "${HOSTNAME:-unknown}"
    container_name: secra-grpc
    command: ./secra-grpc
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "50051:50051"
    environment:
      - POSTGRES_DSN=postgres://postgres:postgres@db:5432/secra?sslmode=disable
      - GRPC_PORT=:50051

  web:
    build:
      context: .
      args:
        VERSION: "${APP_VERSION:-dev}"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        GIT_COMMIT: "${GIT_COMMIT:-none}"
        BUILT_BY: "${HOSTNAME:-unknown}"
    container_name: secra-web
    command: ./secra-http
    depends_on:
      grpc:
        condition: service_started
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - ./web:/app/web # Enable live template updates
    environment:
      - POSTGRES_DSN=postgres://postgres:postgres@db:5432/secra?sslmode=disable
      - GRPC_PORT=:50051
    healthcheck:
      test: ["CMD", "secra", "health", "check", "--type", "http"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  secra_pgdata:
